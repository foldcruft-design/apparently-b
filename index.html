<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghost Extra App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* Использование системных переменных Телеграма для авто-подстройки под тему (темная/светлая) */
        :root {
            --bg-color: var(--tg-theme-bg-color, #17212b);
            --text-color: var(--tg-theme-text-color, #f5f5f5);
            --hint-color: var(--tg-theme-hint-color, #708499);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #202b36);
        }

        * {
            box-sizing: border-box;
            user-select: none; /* Запрещаем выделение текста, чтобы было похоже на нативное приложение */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Карточка пользователя */
        .user-card {
            background: linear-gradient(145deg, var(--secondary-bg), rgba(255,255,255,0.02));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background-color: var(--button-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .user-name {
            font-size: 18px;
            font-weight: 700;
        }

        .user-status {
            font-size: 13px;
            color: var(--hint-color);
        }

        /* Сетка главного меню */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            flex-grow: 1;
        }

        .menu-item {
            background-color: var(--secondary-bg);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 24px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        /* Эффект нажатия (активная кнопка) */
        .menu-item:active {
            transform: scale(0.95);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .menu-item .icon {
            font-size: 32px;
        }

        .menu-item .title {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        /* Информационный футер */
        .footer {
            text-align: center;
            font-size: 12px;
            color: var(--hint-color);
            margin-top: 20px;
            padding: 10px 0;
        }
    </style>
</head>
<body>

    <div class="user-card">
        <div id="avatar" class="avatar">?</div>
        <div class="user-info">
            <div id="username" class="user-name">Загрузка...</div>
            <div id="limits" class="user-status">Синхронизация лимитов...</div>
        </div>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="handleMenuClick('logs', '📂 Мои Логи')">
            <div class="icon">📂</div>
            <div class="title">Мои Логи</div>
        </div>
        <div class="menu-item" onclick="handleMenuClick('tracker', '🎯 Трекер')">
            <div class="icon">🎯</div>
            <div class="title">Трекер</div>
        </div>
        <div class="menu-item" onclick="handleMenuClick('shop', '💎 Магазин')">
            <div class="icon">💎</div>
            <div class="title">Магазин</div>
        </div>
        <div class="menu-item" onclick="handleMenuClick('settings', '⚙️ Настройки')">
            <div class="icon">⚙️</div>
            <div class="title">Настройки</div>
        </div>
    </div>

    <div class="footer">Ghost Extra • ohoster твое лучшее решение</div>

    <script>
        // Инициализируем объект Телеграма
        const tg = window.Telegram.WebApp;
        
        // Расширяем приложение на максимальную высоту экрана телефона
        tg.expand();
        
        // Сообщаем Телеграму, что интерфейс полностью загрузился и готов к показу
        tg.ready();

        // Настройка Главной Кнопки Телеграма (MainButton внизу экрана)
        tg.MainButton.text = "ЗАКРЫТЬ МЕНЮ";
        tg.MainButton.textColor = "#ffffff";
        tg.MainButton.color = "#cc2424"; // Сделаем её красной для выхода
        tg.MainButton.show();
        
        // Навешиваем событие закрытия на Главную кнопку ТГ
        tg.MainButton.onClick(function() {
            tg.close();
        });

        // 1. Получение данных о пользователе из Telegram Скрипта
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            
            // Выводим Имя (и фамилию, если есть)
            const fullName = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('username').innerText = fullName;
            
            // Берем первую букву имени для аватарки
            document.getElementById('avatar').innerText = user.first_name.charAt(0);
        } else {
            // Флбэк для тестов в обычном браузере на ПК
            document.getElementById('username').innerText = "Разработчик (Тест)";
            document.getElementById('avatar').innerText = "D";
        }

        // 2. Функция отправки запроса к твоему Python API на Охостере
        async function fetchUserLimits() {
            // ВАЖНО:window.location.origin автоматически подставит текущий адрес твоего сервера на Охостере
            const apiUrl = `${window.location.origin}/api/get_user_limits`;
            
            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        initData: tg.initData // Отправляем строку инициализации для проверки юзера на бэкенде
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('limits').innerText = `Кэшировано логов: ${data.total_cached}`;
                } else {
                    document.getElementById('limits').innerText = "Ошибка авторизации профиля";
                }
            } catch (error) {
                console.error("Ошибка при работе с API:", error);
                document.getElementById('limits').innerText = "Не удалось связаться с сервером";
            }
        }

        // Запускаем опрос лимитов сразу при открытии Mini App
        fetchUserLimits();

        // 3. Обработка кликов по пунктам меню
        function handleMenuClick(actionType, actionName) {
            // Включаем легкую приятную вибрацию на телефоне (доступно только внутри TG)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            
            // Пример: Отправляем данные обратно боту текстом в чат и закрываем приложение
            // Бот получит это сообщение и сможет запустить нужную функцию на бэкенде
            tg.sendData(`action:${actionType}`);
            
            // Показываем нативное всплывающее окно внутри ТГ перед закрытием
            tg.showAlert(`Вы выбрали: ${actionName}\nДанные отправлены боту!`);
        }
    </script>
</body>
</html>
